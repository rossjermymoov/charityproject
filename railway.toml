[build]
builder = "nixpacks"
buildCommand = "cd packages/web && npm install && npx prisma generate && npx next build"

[deploy]
startCommand = "cd packages/web && bash scripts/start.sh"
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[service]
internalPort = 3000
